target-version = "py311"

extend-exclude = [
    "Audio_logs",
    "odpadki_surovi",
    "odpadki_obdelani",
    "test_data",
    "MODELS",
    "URG",
]

[lint]
select = [
    "E9",   # syntax errors
    "F63",  # invalid comparisons / assertions
    "F7",   # syntax-level statement errors (e.g. break outside loop)
    "F82",  # undefined name
]
